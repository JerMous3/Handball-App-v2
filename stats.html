<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season Statistics - Handball Tracker</title>
  <link rel="preload" href="fonts/manrope-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/bebas-neue-400-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="polish-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }
    
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    
    .page-header {
      margin-bottom: 32px;
    }
    
    .page-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 48px;
      color: var(--accent);
      margin: 0 0 8px 0;
      letter-spacing: 2px;
    }
    
    .page-subtitle {
      font-size: 16px;
      color: var(--muted);
      margin: 0;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    
    .stat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .stat-icon {
      font-size: 24px;
    }
    
    .stat-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--text);
    }
    
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .leaderboard-item:hover {
      background: var(--surface);
      transform: translateX(4px);
    }
    
    .leaderboard-rank {
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      color: var(--muted);
      min-width: 32px;
    }
    
    .leaderboard-rank.gold { color: #FFD700; }
    .leaderboard-rank.silver { color: #C0C0C0; }
    .leaderboard-rank.bronze { color: #CD7F32; }
    
    .leaderboard-player {
      flex: 1;
    }
    
    .player-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 2px;
    }
    
    .player-stats {
      font-size: 12px;
      color: var(--muted);
    }
    
    .leaderboard-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      color: var(--text);
      margin: 40px 0 20px 0;
      letter-spacing: 2px;
    }
    
    .matches-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .table-header {
      display: grid;
      grid-template-columns: 120px 2fr 80px 2fr 100px;
      gap: 16px;
      padding: 16px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    
    .table-row {
      display: grid;
      grid-template-columns: 120px 2fr 80px 2fr 100px;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    
    .table-row:last-child {
      border-bottom: none;
    }
    
    .table-row:hover {
      background: var(--surface2);
    }
    
    .match-date {
      font-size: 13px;
      color: var(--muted);
    }
    
    .match-team {
      font-weight: 600;
      color: var(--text);
    }
    
    .match-score {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--accent);
      text-align: center;
    }
    
    .match-result {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .match-result.win {
      background: rgba(76, 217, 100, 0.15);
      color: #4CD964;
    }
    
    .match-result.loss {
      background: rgba(255, 59, 59, 0.15);
      color: var(--red);
    }
    
    .match-result.draw {
      background: rgba(255, 193, 7, 0.15);
      color: #ffc107;
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    
    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .empty-text {
      font-size: 16px;
      color: var(--muted);
    }

    .season-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
    }
    .season-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    .btn-new-season {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-new-season:hover { background: var(--accent); color: #000; }

    .season-badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-left: 12px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      .topbar-content {
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 12px;
      }

      .btn-new-season {
        font-size: 12px;
        padding: 6px 10px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .table-header,
      .table-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .table-header {
        display: none;
      }

      .table-row {
        padding: 16px;
      }

      .page-title {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-content">
      <h2 style="margin: 0; color: var(--text); font-size: 18px; font-weight: 600; white-space: nowrap;">📊 Statistics</h2>
      <select class="season-select" id="seasonSelect" onchange="onSeasonChange()" style="flex:1; max-width: 240px;">
        <option value="">Current Season</option>
      </select>
      <button class="btn-new-season" onclick="startNewSeason()">+ New Season</button>
      <button onclick="exportToExcel()" style="
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
        white-space: nowrap;
      " onmouseover="this.style.background='var(--accent)'; this.style.color='#000'; this.style.borderColor='var(--accent)'"
         onmouseout="this.style.background='transparent'; this.style.color='var(--text)'; this.style.borderColor='var(--border)'">
        <span>💾</span>
        <span>Export</span>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Season Statistics<span class="season-badge" id="seasonBadge">Current Season</span></h1>
      <p class="page-subtitle">Aggregated player and team performance from match history</p>
    </div>
    
    <!-- Leaderboards Grid -->
    <div class="stats-grid" id="leaderboards">
      <!-- Top Scorers -->
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon">⚽</div>
          <div class="stat-title">Top Scorers</div>
        </div>
        <div class="leaderboard" id="topScorers">
          <div style="text-align: center; padding: 20px; color: var(--muted);">Loading...</div>
        </div>
      </div>
      
      <!-- Stop % -->
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon">🧤</div>
          <div class="stat-title">Stop %</div>
        </div>
        <div class="leaderboard" id="topGoalkeepers">
          <div style="text-align: center; padding: 20px; color: var(--muted);">Loading...</div>
        </div>
      </div>
      
      <!-- Most Disciplined -->
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon">🟨</div>
          <div class="stat-title">Most Cards</div>
        </div>
        <div class="leaderboard" id="mostCards">
          <div style="text-align: center; padding: 20px; color: var(--muted);">Loading...</div>
        </div>
      </div>
    </div>
    
    <!-- Match History -->
    <h2 class="section-title">Match History</h2>
    <div class="matches-table">
      <div class="table-header">
        <div>Date</div>
        <div>Home Team</div>
        <div>Score</div>
        <div>Away Team</div>
        <div>Result</div>
      </div>
      <div id="matchHistory">
        <div style="text-align: center; padding: 40px; color: var(--muted);">Loading match history...</div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qgqryeanopdxrwrfczcx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_I67bdwmAkdodIk5bAQf1Zw_86KroW5R';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allMatches = [];
    let currentSession = null;
    let selectedSeason = null; // null = current season

    const LAST_SEASON_KEY = 'hb-stats-last-season';

    async function loadData() {
      const { data: { session }, error: sessionError } = await _supabase.auth.getSession();
      if (sessionError || !session) {
        document.getElementById('matchHistory').innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <p style="color: var(--muted); margin-bottom: 16px;">You need to sign in to view statistics</p>
            <a href="index.html" style="color: var(--accent); text-decoration: none;">← Back to Tracker</a>
          </div>
        `;
        return;
      }
      currentSession = session;
      await loadSeasonNames();
      restoreLastSeason();
      await loadMatchHistory();
      calculateStats();
    }

    async function loadSeasonNames() {
      // Season names come from two places: labels already on saved matches,
      // and seasons created ahead of time (stored in the `seasons` table).
      const [matchesRes, seasonsRes] = await Promise.all([
        _supabase
          .from('matches')
          .select('season')
          .eq('user_id', currentSession.user.id)
          .not('season', 'is', null),
        _supabase
          .from('seasons')
          .select('name')
          .eq('user_id', currentSession.user.id),
      ]);

      const fromMatches = (matchesRes.data || []).map(m => m.season);
      const fromSeasons = (seasonsRes.data || []).map(s => s.name);
      const names = [...new Set([...fromMatches, ...fromSeasons])].sort((a, b) => b.localeCompare(a));

      const sel = document.getElementById('seasonSelect');
      sel.innerHTML = '<option value="">Current Season</option>';
      names.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
      if (selectedSeason) sel.value = selectedSeason;
    }

    // Restore the season the user last viewed on this device, if it still exists.
    function restoreLastSeason() {
      let stored = null;
      try { stored = localStorage.getItem(LAST_SEASON_KEY); } catch (_) {}
      if (stored === null) return; // no preference saved yet → keep Current Season

      const sel = document.getElementById('seasonSelect');
      const exists = [...sel.options].some(o => o.value === stored);
      if (!exists) return; // season was deleted/renamed → fall back to Current Season

      sel.value = stored;
      selectedSeason = stored || null;
      document.getElementById('seasonBadge').textContent = selectedSeason || 'Current Season';
    }

    function onSeasonChange() {
      selectedSeason = document.getElementById('seasonSelect').value || null;
      try { localStorage.setItem(LAST_SEASON_KEY, selectedSeason || ''); } catch (_) {}
      const badge = document.getElementById('seasonBadge');
      badge.textContent = selectedSeason || 'Current Season';
      loadMatchHistory().then(() => calculateStats());
    }

    async function loadMatchHistory() {
      try {
        let query = _supabase
          .from('matches')
          .select('*')
          .eq('user_id', currentSession.user.id)
          .order('played_at', { ascending: false });

        if (selectedSeason) {
          query = query.eq('season', selectedSeason);
        } else {
          query = query.is('season', null);
        }

        const { data, error } = await query;
        if (error) throw error;

        allMatches = data || [];
        renderMatchHistory();
      } catch (error) {
        console.error('Error loading match history:', error);
        document.getElementById('matchHistory').innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--red);">
            Failed to load match history: ${error.message}
          </div>
        `;
      }
    }

    async function startNewSeason() {
      // How many matches are sitting in the current (unlabelled) season?
      const { count } = await _supabase
        .from('matches')
        .select('*', { count: 'exact', head: true })
        .eq('user_id', currentSession.user.id)
        .is('season', null);
      const currentCount = count || 0;

      const seasonName = prompt(
        `Name the new season.\n\n` +
        `Example: "2024/2025" or "Spring 2025"\n\n` +
        (currentCount > 0
          ? `You have ${currentCount} match${currentCount !== 1 ? 'es' : ''} in the current season — ` +
            `after naming, you'll choose whether to archive them into it.`
          : `It will be available to pick when saving matches.`)
      );
      if (!seasonName || !seasonName.trim()) return;

      const name = seasonName.trim();

      // Reject a name already used by a match label or a pre-created season.
      const [matchDup, seasonDup] = await Promise.all([
        _supabase
          .from('matches')
          .select('id')
          .eq('user_id', currentSession.user.id)
          .eq('season', name)
          .limit(1),
        _supabase
          .from('seasons')
          .select('id')
          .eq('user_id', currentSession.user.id)
          .eq('name', name)
          .limit(1),
      ]);
      if ((matchDup.data && matchDup.data.length > 0) || (seasonDup.data && seasonDup.data.length > 0)) {
        alert(`A season named "${name}" already exists. Choose a different name.`);
        return;
      }

      // Register the season so it persists (and syncs) even before it has matches.
      const { error: insertError } = await _supabase
        .from('seasons')
        .insert({ user_id: currentSession.user.id, name });
      if (insertError) {
        alert('Failed to create season: ' + insertError.message);
        return;
      }

      // If there are current matches, offer to archive them into the new season.
      let archived = false;
      if (currentCount > 0) {
        archived = confirm(
          `Archive the ${currentCount} current match${currentCount !== 1 ? 'es' : ''} into "${name}"?\n\n` +
          `OK — move them into "${name}" and start fresh.\n` +
          `Cancel — just create "${name}" and leave current matches as they are.`
        );
        if (archived) {
          const { error } = await _supabase
            .from('matches')
            .update({ season: name })
            .eq('user_id', currentSession.user.id)
            .is('season', null);
          if (error) {
            alert('Season created, but archiving current matches failed: ' + error.message);
            archived = false;
          }
        }
      }

      // Switch the view to the new season.
      selectedSeason = name;
      try { localStorage.setItem(LAST_SEASON_KEY, name); } catch (_) {}
      await loadSeasonNames();
      document.getElementById('seasonSelect').value = name;
      document.getElementById('seasonBadge').textContent = name;
      await loadMatchHistory();
      calculateStats();
      alert(archived
        ? `Season "${name}" created and ${currentCount} match${currentCount !== 1 ? 'es' : ''} archived into it. New matches default to the current season.`
        : `Season "${name}" created. Pick it from the season menu when saving a match.`);
    }
    
    function calculateStats() {
      const playerStats = {};
      
      // Aggregate all player stats from matches
      allMatches.forEach(match => {
        // Our data structure: player_stats is an object with player IDs as keys
        const matchPlayerStats = match.player_stats || {};
        
        // Get player names from event_log if available
        const eventLog = match.event_log || [];
        const playerNames = {};
        const goalsAgainstByName = {};
        eventLog.forEach(event => {
          if (event.playerId && event.name) {
            playerNames[event.playerId] = event.name;
          }
          if (event.type === 'goal_against' && event.name) {
            goalsAgainstByName[event.name] = (goalsAgainstByName[event.name] || 0) + 1;
          }
        });

        Object.entries(matchPlayerStats).forEach(([playerId, stats]) => {
          const playerName = playerNames[playerId] || `Player ${playerId}`;

          if (!playerStats[playerName]) {
            playerStats[playerName] = {
              name: playerName,
              goals: 0,
              assists: 0,
              saves: 0,
              goalsAgainst: 0,
              shots: 0,
              yellows: 0,
              suspensions: 0,
              reds: 0,
              matches: 0
            };
          }

          const aggregated = playerStats[playerName];
          aggregated.goals += stats.goals || 0;
          aggregated.assists += stats.assists || 0;
          aggregated.saves += stats.saves || 0;
          aggregated.goalsAgainst += goalsAgainstByName[playerName] || 0;
          aggregated.shots += stats.shots || 0;
          aggregated.yellows += stats.yellows || 0;
          aggregated.suspensions += stats.suspensions || 0;
          aggregated.reds += (stats.redCard ? 1 : 0);
          aggregated.matches++;
        });
      });
      
      renderLeaderboards(playerStats);
    }
    
    function renderLeaderboards(playerStats) {
      const players = Object.values(playerStats);
      
      // Top Scorers
      const topScorers = players
        .filter(p => p.goals > 0)
        .sort((a, b) => b.goals - a.goals)
        .slice(0, 5);
      
      document.getElementById('topScorers').innerHTML = topScorers.length > 0
        ? topScorers.map((player, index) => renderLeaderboardItem(
            index + 1,
            player.name,
            player.goals,
            `${player.matches} matches`,
            '⚽'
          )).join('')
        : '<div style="text-align: center; padding: 20px; color: var(--muted);">No data yet</div>';
      
      // Stop % (goalkeepers)
      const goalkeepers = players
        .filter(p => (p.saves + p.goalsAgainst) > 0)
        .map(p => ({
          ...p,
          shotsFaced: p.saves + p.goalsAgainst,
          stopPct: Math.round((p.saves / (p.saves + p.goalsAgainst)) * 100)
        }))
        .sort((a, b) => b.stopPct - a.stopPct);

      document.getElementById('topGoalkeepers').innerHTML = goalkeepers.length > 0
        ? goalkeepers.map((player, index) => renderLeaderboardItem(
            index + 1,
            player.name,
            player.stopPct + '%',
            `${player.saves} saves · ${player.shotsFaced} faced`,
            '🧤'
          )).join('')
        : '<div style="text-align: center; padding: 20px; color: var(--muted);">No data yet</div>';
      
      // Most Cards
      const mostCards = players
        .filter(p => (p.yellows + p.suspensions + p.reds) > 0)
        .map(p => ({
          ...p,
          totalCards: p.yellows + p.suspensions + p.reds
        }))
        .sort((a, b) => b.totalCards - a.totalCards)
        .slice(0, 5);
      
      document.getElementById('mostCards').innerHTML = mostCards.length > 0
        ? mostCards.map((player, index) => renderLeaderboardItem(
            index + 1,
            player.name,
            player.totalCards,
            `${player.yellows}🟨 ${player.suspensions}⏱️ ${player.reds}🟥`,
            '🟨'
          )).join('')
        : '<div style="text-align: center; padding: 20px; color: var(--muted);">No data yet</div>';
    }
    
    function renderLeaderboardItem(rank, name, value, subtitle, icon) {
      const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
      
      return `
        <div class="leaderboard-item">
          <div class="leaderboard-rank ${rankClass}">${rank}</div>
          <div class="leaderboard-player">
            <div class="player-name">${name}</div>
            <div class="player-stats">${subtitle}</div>
          </div>
          <div class="leaderboard-value">${value}</div>
        </div>
      `;
    }
    
    function renderMatchHistory() {
      const container = document.getElementById('matchHistory');
      
      if (allMatches.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-title">No Match History</div>
            <div class="empty-text">Your completed matches will appear here</div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = allMatches.map(match => {
        const date = new Date(match.played_at || match.created_at);
        const teamName = match.team_name || 'Home';
        const opponent = match.opponent || 'Away';
        const scoreHome = match.goals_for || 0;
        const scoreAway = match.goals_against || 0;
        
        let result = 'draw';
        if (scoreHome > scoreAway) result = 'win';
        if (scoreHome < scoreAway) result = 'loss';
        
        return `
          <div class="table-row">
            <div class="match-date">${formatDate(date)}</div>
            <div class="match-team">${teamName}</div>
            <div class="match-score">${scoreHome} - ${scoreAway}</div>
            <div class="match-team">${opponent}</div>
            <div>
              <span class="match-result ${result}">
                ${result === 'win' ? 'Won' : result === 'loss' ? 'Lost' : 'Draw'}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function formatDate(date) {
      const options = { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      };
      return date.toLocaleDateString('en-US', options);
    }
    
    function exportToExcel() {
      const wb = XLSX.utils.book_new();
      const dateStr = new Date().toLocaleDateString('en-GB');
      
      // ── Sheet 1: Player Statistics ──
      const playerStatsRows = [
        ['SEASON PLAYER STATISTICS', '', '', '', '', '', '', '', ''],
        ['Generated:', dateStr, '', '', '', '', '', '', ''],
        [],
        ['Player', 'Matches', 'Goals', 'Assists', 'Shots', 'Shot %', 'Saves', 'Yellow Cards', 'Suspensions', 'Red Cards']
      ];
      
      // Get all player stats from the leaderboards
      const playerStats = {};
      allMatches.forEach(match => {
        const matchPlayerStats = match.player_stats || {};
        const eventLog = match.event_log || [];
        const playerNames = {};
        
        eventLog.forEach(event => {
          if (event.playerId && event.name) {
            playerNames[event.playerId] = event.name;
          }
        });
        
        Object.entries(matchPlayerStats).forEach(([playerId, stats]) => {
          const playerName = playerNames[playerId] || `Player ${playerId}`;
          
          if (!playerStats[playerName]) {
            playerStats[playerName] = {
              name: playerName,
              goals: 0,
              assists: 0,
              saves: 0,
              shots: 0,
              yellows: 0,
              suspensions: 0,
              reds: 0,
              matches: 0
            };
          }
          
          const aggregated = playerStats[playerName];
          aggregated.goals += stats.goals || 0;
          aggregated.assists += stats.assists || 0;
          aggregated.saves += stats.saves || 0;
          aggregated.shots += stats.shots || 0;
          aggregated.yellows += stats.yellows || 0;
          aggregated.suspensions += stats.suspensions || 0;
          aggregated.reds += (stats.redCard ? 1 : 0);
          aggregated.matches++;
        });
      });
      
      // Sort by goals
      const sortedPlayers = Object.values(playerStats).sort((a, b) => b.goals - a.goals);
      
      sortedPlayers.forEach(player => {
        const shotPct = player.shots > 0 ? Math.round((player.goals / player.shots) * 100) : 0;
        playerStatsRows.push([
          player.name,
          player.matches,
          player.goals,
          player.assists,
          player.shots,
          shotPct + '%',
          player.saves,
          player.yellows,
          player.suspensions,
          player.reds
        ]);
      });
      
      const wsPlayerStats = XLSX.utils.aoa_to_sheet(playerStatsRows);
      wsPlayerStats['!cols'] = [
        { wch: 20 }, // Player
        { wch: 10 }, // Matches
        { wch: 8 },  // Goals
        { wch: 10 }, // Assists
        { wch: 8 },  // Shots
        { wch: 10 }, // Shot %
        { wch: 8 },  // Saves
        { wch: 14 }, // Yellow Cards
        { wch: 14 }, // Suspensions
        { wch: 12 }  // Red Cards
      ];
      XLSX.utils.book_append_sheet(wb, wsPlayerStats, 'Player Stats');
      
      // ── Sheet 2: Match History ──
      const matchRows = [
        ['MATCH HISTORY', '', '', '', '', '', ''],
        ['Generated:', dateStr, '', '', '', '', ''],
        [],
        ['Date', 'Team', 'Score', 'Opponent', 'Result', 'Shots', 'Shot %']
      ];
      
      allMatches.forEach(match => {
        const date = new Date(match.played_at || match.created_at);
        const teamName = match.team_name || 'Home';
        const opponent = match.opponent || 'Away';
        const scoreHome = match.goals_for || 0;
        const scoreAway = match.goals_against || 0;
        const shots = match.shots || 0;
        const shotPct = match.shot_pct || 0;
        
        let result = 'Draw';
        if (scoreHome > scoreAway) result = 'Win';
        if (scoreHome < scoreAway) result = 'Loss';
        
        matchRows.push([
          formatDate(date),
          teamName,
          `${scoreHome} - ${scoreAway}`,
          opponent,
          result,
          shots,
          shotPct + '%'
        ]);
      });
      
      const wsMatches = XLSX.utils.aoa_to_sheet(matchRows);
      wsMatches['!cols'] = [
        { wch: 20 }, // Date
        { wch: 18 }, // Team
        { wch: 10 }, // Score
        { wch: 18 }, // Opponent
        { wch: 8 },  // Result
        { wch: 8 },  // Shots
        { wch: 10 }  // Shot %
      ];
      XLSX.utils.book_append_sheet(wb, wsMatches, 'Match History');
      
      // ── Sheet 3: Season Summary ──
      const totalMatches = allMatches.length;
      const totalGoalsFor = allMatches.reduce((sum, m) => sum + (m.goals_for || 0), 0);
      const totalGoalsAgainst = allMatches.reduce((sum, m) => sum + (m.goals_against || 0), 0);
      const totalShots = allMatches.reduce((sum, m) => sum + (m.shots || 0), 0);
      const totalSaves = allMatches.reduce((sum, m) => sum + (m.saves || 0), 0);
      const wins = allMatches.filter(m => (m.goals_for || 0) > (m.goals_against || 0)).length;
      const losses = allMatches.filter(m => (m.goals_for || 0) < (m.goals_against || 0)).length;
      const draws = allMatches.filter(m => (m.goals_for || 0) === (m.goals_against || 0)).length;
      
      const summaryRows = [
        ['SEASON SUMMARY', ''],
        ['Generated:', dateStr],
        [],
        ['Total Matches', totalMatches],
        ['Wins', wins],
        ['Losses', losses],
        ['Draws', draws],
        [],
        ['Goals Scored', totalGoalsFor],
        ['Goals Conceded', totalGoalsAgainst],
        ['Goal Difference', totalGoalsFor - totalGoalsAgainst],
        ['Total Shots', totalShots],
        ['Total Saves', totalSaves],
        ['Avg Goals/Match', totalMatches > 0 ? (totalGoalsFor / totalMatches).toFixed(1) : 0],
        ['Shot Efficiency %', totalShots > 0 ? Math.round((totalGoalsFor / totalShots) * 100) + '%' : '0%']
      ];
      
      const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
      wsSummary['!cols'] = [{ wch: 25 }, { wch: 15 }];
      XLSX.utils.book_append_sheet(wb, wsSummary, 'Season Summary');
      
      // ── Download ──
      const filename = `season_statistics_${dateStr.replace(/\//g,'-')}.xlsx`;
      XLSX.writeFile(wb, filename);
      
      console.log('✅ Season statistics exported to Excel');
    }
    
    loadData();
  </script>
</body>
