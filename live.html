<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Matches - Handball Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qgqryeanopdxrwrfczcx.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_I67bdwmAkdodIk5bAQf1Zw_86KroW5R';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2a;
    --border: #252b38;
    --accent: #e8ff00;
    --accent2: #00d4ff;
    --red: #ff3b3b;
    --yellow: #ffc700;
    --green: #00e87a;
    --text: #f0f2f6;
    --muted: #6b7585;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, #12151c 0%, #0f1218 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .topbar-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(232, 255, 0, 0.3);
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 59, 59, 0.15);
    border: 1px solid var(--red);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .hero-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1;
  }

  .hero-subtitle {
    color: var(--muted);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 32px;
  }

  .live-count { color: var(--accent); font-weight: 700; }

  .matches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
    margin-bottom: 60px;
  }

  .match-card {
    background: linear-gradient(135deg, #12151c 0%, #1a1f2a 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    animation: slideUp 0.4s ease-out backwards;
  }

  .match-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .match-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 48px rgba(232, 255, 0, 0.15);
  }

  .match-card:hover::before { opacity: 1; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .match-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 59, 59, 0.15);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .match-time {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .team-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .team-row:last-child { border-bottom: none; }

  .team-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .team-score {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
    min-width: 50px;
    text-align: right;
  }

  .match-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .meta-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .watch-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .watch-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(232, 255, 0, 0.4);
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
  }

  .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
  .empty-title { font-size: 24px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  .empty-text { font-size: 16px; color: var(--muted); opacity: 0.7; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-size: 18px;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    .hero-title { font-size: 36px; }
    .matches-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-content">
    <div class="brand">
      <div class="brand-logo">HANDBALL TRACKER</div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span id="liveCount">Loading...</span>
      </div>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-header">
    <h1 class="hero-title">Live Matches</h1>
    <p class="hero-subtitle" id="heroSubtitle">
      <span class="live-count">...</span> happening right now
    </p>
  </div>

  <div id="matchesContainer">
    <div class="loading">Loading live matches...</div>
  </div>
</div>

<script>
let liveMatches = [];
let subscription = null;

// Load live matches
async function loadLiveMatches() {
  try {
    const { data, error } = await supabase
      .from('live_matches')
      .select('*')
      .eq('is_live', true)
      .order('started_at', { ascending: false });

    if (error) throw error;

    liveMatches = data || [];
    renderMatches();
    updateLiveCount();

  } catch (error) {
    console.error('Error loading matches:', error);
    showError();
  }
}

// Subscribe to real-time updates
function subscribeToMatches() {
  subscription = supabase
    .channel('live-matches-channel')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'live_matches',
        filter: 'is_live=eq.true'
      },
      (payload) => {
        console.log('Match update:', payload);
        handleMatchUpdate(payload);
      }
    )
    .subscribe();
}

// Handle real-time updates
function handleMatchUpdate(payload) {
  const { eventType, new: newRecord, old: oldRecord } = payload;

  if (eventType === 'INSERT') {
    liveMatches.unshift(newRecord);
  } else if (eventType === 'UPDATE') {
    const index = liveMatches.findIndex(m => m.id === newRecord.id);
    if (index !== -1) {
      liveMatches[index] = newRecord;
    }
  } else if (eventType === 'DELETE') {
    liveMatches = liveMatches.filter(m => m.id !== oldRecord.id);
  }

  renderMatches();
  updateLiveCount();
}

// Render matches to DOM
function renderMatches() {
  const container = document.getElementById('matchesContainer');

  if (liveMatches.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏐</div>
        <div class="empty-title">No live matches right now</div>
        <div class="empty-text">Check back soon for live action!</div>
      </div>
    `;
    return;
  }

  const matchesHTML = liveMatches.map((match, index) => `
    <div class="match-card" style="animation-delay: ${index * 0.05}s" onclick="watchMatch('${match.id}')">
      <div class="match-status">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>Live</span>
        </div>
        <div class="match-time">${formatTime(match.match_time_seconds)}</div>
      </div>
      
      <div class="match-teams">
        <div class="team-row">
          <div class="team-name">${escapeHtml(match.team_name)}</div>
          <div class="team-score">${match.score_home}</div>
        </div>
        <div class="team-row">
          <div class="team-name">${escapeHtml(match.opponent)}</div>
          <div class="team-score">${match.score_away}</div>
        </div>
      </div>
      
      <div class="match-meta">
        <div style="display: flex; gap: 16px;">
          <div class="meta-stat">
            <span class="icon">⏱️</span>
            <span>${match.current_half === 'first' ? '1st Half' : '2nd Half'}</span>
          </div>
          <div class="meta-stat">
            <span class="icon">📅</span>
            <span>${formatStartTime(match.started_at)}</span>
          </div>
        </div>
        <button class="watch-btn" onclick="event.stopPropagation(); watchMatch('${match.id}')">Watch</button>
      </div>
    </div>
  `).join('');

  container.innerHTML = `<div class="matches-grid">${matchesHTML}</div>`;
}

// Update live count
function updateLiveCount() {
  const count = liveMatches.length;
  document.getElementById('liveCount').textContent = `${count} Live Now`;
  document.getElementById('heroSubtitle').innerHTML = `
    <span class="live-count">${count} ${count === 1 ? 'match' : 'matches'}</span> happening right now
  `;
}

// Navigate to watch page
function watchMatch(matchId) {
  window.location.href = `watch.html?match=${matchId}`;
}

// Utility functions
function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${String(secs).padStart(2, '0')}`;
}

function formatStartTime(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);

  if (diffMins < 1) return 'Just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours}h ago`;
  
  return date.toLocaleDateString();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showError() {
  const container = document.getElementById('matchesContainer');
  container.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Failed to load matches</div>
      <div class="empty-text">Please refresh the page to try again.</div>
    </div>
  `;
}

// Initialize
loadLiveMatches();
subscribeToMatches();

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (subscription) {
    supabase.removeChannel(subscription);
  }
});

// Auto-refresh every 30 seconds as backup
setInterval(loadLiveMatches, 30000);
</script>

</body>
</html>
